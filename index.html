<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紙電路實作學習單</title>
    <style>
        /* 全域變數與字體設定 */
        :root {
            --primary-color: #7bc6cc;      /* 舒適的粉藍色 */
            --secondary-color: #be93c5;    /* 活潑的粉紫色 */
            --bg-color: #f5fafd;           /* 乾淨明亮的背景 */
            --card-bg: #ffffff;
            --text-color: #334e68;
            --border-color: #d0e1fd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
        }

        body {
            background: linear-gradient(135deg, #e6f4f8 0%, #f2f9f6 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 卡片容器設計 */
        .container {
            background-color: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(123, 198, 204, 0.15);
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        /* 標題與副標題 */
        h1 {
            color: #2c5282;
            font-size: 2rem;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subtitle {
            color: #627d98;
            font-size: 1rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* 表單排版 */
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #486581;
        }

        /* 輸入框樣式與 Hover/Focus 動態效果 */
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-color);
            background-color: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:hover, textarea:hover {
            border-color: #a3cbfa;
            background-color: #ffffff;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(123, 198, 204, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* 姓名班級並排 (網頁版並排，手機版自動換行) */
        .student-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* 單選題 Radio Button 客製化樣式 */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background-color: #f8fafc;
            font-weight: normal;
            transition: all 0.2s ease;
        }

        .radio-label:hover {
            border-color: var(--primary-color);
            background-color: #f0f9fa;
            transform: translateY(-1px);
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #9fb3c8;
            border-radius: 50%;
            margin-right: 12px;
            outline: none;
            background-color: #fff;
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
        }

        input[type="radio"]::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transform: scale(0);
            transition: 0.15s transform ease-in-out;
            background-color: #fff;
        }

        input[type="radio"]:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        input[type="radio"]:checked::before {
            transform: scale(1);
        }

        /* 被選取時的外部標籤樣式 */
        .radio-label.selected {
            border-color: var(--primary-color);
            background-color: #e6f6f7;
            font-weight: 600;
        }

        /* 送出按鈕設計 */
        .submit-btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, #64b5bc 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(123, 198, 204, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(123, 198, 204, 0.6);
            filter: brightness(1.05);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* 提示字顏色 */
        ::placeholder {
            color: #bac7d5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 紙電路實作學習單</h1>
    <p class="subtitle">完成你的專屬紙電路後，請填寫這份學習單紀錄你的成就吧！</p>

    <form id="learningForm">
        <div class="student-info">
            <div class="form-group">
                <label for="className">班級座號：</label>
                <input type="text" id="className" name="className" placeholder="例如 701-05">
            </div>
            <div class="form-group">
                <label for="name">學生姓名：</label>
                <input type="text" id="name" name="name" placeholder="請輸入姓名">
            </div>
        </div>

        <div class="form-group">
            <label>1. 你今天主要使用了哪種顏色的 LED 燈？</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="ledColor" value="紅色"> 紅色
                </label>
                <label class="radio-label">
                    <input type="radio" name="ledColor" value="黃色"> 黃色
                </label>
                <label class="radio-label">
                    <input type="radio" name="ledColor" value="綠色"> 綠色
                </label>
                <label class="radio-label">
                    <input type="radio" name="ledColor" value="藍色"> 藍色
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>2. 你的紙電路最後有成功發光嗎？</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="isLight" value="有！成功發光了"> 有！成功發光了
                </label>
                <label class="radio-label">
                    <input type="radio" name="isLight" value="沒有，差一點點"> 沒有，差一點點
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="reflection">3. 實作過程中遇到最大的困難是什麼？你是怎麼解決的？</label>
            <textarea id="reflection" name="reflection" placeholder="請寫下你的心得與解決方法..."></textarea>
        </div>

        <button type="submit" class="submit-btn">送出學習單</button>
    </form>
</div>

<script>
    // 1. 設定你的 Google Apps Script 網頁應用程式網址 (GAS Web App)
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxwDKev8rrHJuvyvZlh4VjzLCIu0mmuRnF_4i8nOrLcTqQJLfWttrdr9MoMFWi3V74z_A/exec';

    // UI 優化：動態為點選的 Radio Button 加上選取樣式
    const radioLabels = document.querySelectorAll('.radio-label');
    radioLabels.forEach(label => {
        const input = label.querySelector('input[type="radio"]');
        input.addEventListener('change', () => {
            // 先清除同一個問題群組中所有選項的 .selected 樣式
            const groupName = input.getAttribute('name');
            document.querySelectorAll(`input[name="${groupName}"]`).forEach(radio => {
                radio.parentElement.classList.remove('selected');
            });
            // 為當前點選的選項加上 .selected
            if (input.checked) {
                label.classList.add('selected');
            }
        });
    });

    // 表單送出事件與邏輯驗證
    const form = document.getElementById('learningForm');
    form.addEventListener('submit', function(e) {
        e.preventDefault(); // 阻擋表單預設跳頁行為

        // 讀取欄位數值
        const className = document.getElementById('className').value.trim();
        const name = document.getElementById('name').value.trim();
        const reflection = document.getElementById('reflection').value.trim();
        
        // 取得 Radio Button 的選取值
        const ledColorRadio = document.querySelector('input[name="ledColor"]:checked');
        const isLightRadio = document.querySelector('input[name="isLight"]:checked');

        // 2. 檢查所有欄位是否都填寫完成
        if (!className || !name || !ledColorRadio || !isLightRadio || !reflection) {
            alert('❌ 還有欄位沒有寫完喔！請檢查一下再送出。');
            return;
        }

        const ledColor = ledColorRadio.value;
        const isLight = isLightRadio.value;

        // 封裝成要傳送的 JSON 資料物件
        const payload = {
            className: className,
            name: name,
            ledColor: ledColor,
            isLight: isLight,
            reflection: reflection
        };

        // 按鈕視覺效果反饋 (提示傳送中)
        const submitBtn = document.querySelector('.submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = '正在送出中...⏳';

        // 3. 使用 fetch 和 text/plain 透過 POST 將資料送出
        fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // 配合 GAS 常用的 no-cors 模式避免跨網域問題
            headers: {
                'Content-Type': 'text/plain'
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            // 由於使用 no-cors 模式，回應通常會是 opaque，可以直接視為成功
            alert('🎉 學習單送出成功！做得太棒了！');
            
            // 清空表單
            form.reset();
            
            // 移除所有 radio 的特殊選取狀態樣式
            radioLabels.forEach(label => label.classList.remove('selected'));
        })
        .catch(error => {
            console.error('發生錯誤:', error);
            alert('😭 傳送失敗，請檢查網路連線或通知老師！');
        })
        .finally(() => {
            // 恢復按鈕狀態
            submitBtn.disabled = false;
            submitBtn.innerText = '送出學習單';
        });
    });
</script>

</body>
</html>
